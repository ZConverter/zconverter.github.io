name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore mtimes from git history
        run: |
          sudo apt-get update
          sudo apt-get install -y git-restore-mtime
          git restore-mtime --quiet
          # 검증: downloads/ 디렉토리의 바이너리 mtime이 git 시각으로 복원됐는지 출력
          find downloads -type f -printf '%TY-%Tm-%Td  %p\n' | sort

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Verify versions.yml downloads integrity
        run: |
          ruby -ryaml -e '
            data = YAML.load_file("_data/zdm/common/versions.yml")
            missing = []
            %w[api cli].each do |prod|
              (data[prod] || []).each do |v|
                (v["downloads"] || []).each do |d|
                  path = "." + d["file"]
                  missing << "  #{prod} v#{v["version"]} -> #{d["file"]}" unless File.exist?(path)
                end
              end
            end
            if missing.empty?
              puts "OK: all downloads paths exist"
            else
              puts "MISSING downloads referenced in versions.yml:"
              puts missing
              exit 1
            end
          '

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
