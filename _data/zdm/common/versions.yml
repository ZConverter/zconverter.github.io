# ZDM Version Management
# API와 CLI의 버전 정보를 관리합니다.
#
# 필드 설명
#   version       : 버전 문자열 (예: "1.3.0")
#   status        : latest | stable (최상단 1개만 latest)
#   docs          : 이 버전이 참조할 문서 버전. 재사용 패치는 기준 버전 문자열을 둠.
#   docs_updated  : (선택) 수동 문서 갱신일 fallback. Jekyll Generator가
#                   `_plugins/doc_mtime_generator.rb`에서 wrapper + transitive include
#                   파일의 git mtime 중 max를 자동 계산해 우선 사용합니다.
#                   자동 추출이 잘못 잡힐 때만 이 필드에 명시적으로 덮어쓰세요.
#   released      : (선택) 수동 배포일 fallback. 바이너리 파일이 있으면 그 파일의
#                   git mtime이 OS별로 자동 표시되며 이 필드는 무시됩니다.
#                   `downloads: []`(바이너리 미제공) 케이스에서만 수동 입력이 의미를 가집니다.
#   downloads     : OS별 바이너리 경로 (없으면 빈 배열)
#
# 자동화 출처
#   - 배포일: 각 `downloads[].file` 바이너리의 git 최종 커밋 시각(mtime). CI의
#     "Restore mtimes from git history" 스텝이 git mtime을 복원하면 Jekyll의
#     `site.static_files.modified_time`이 OS별로 그대로 표시.
#   - 문서 갱신일: `_plugins/doc_mtime_generator.rb`가 빌드 시 계산해
#     `site.data.zdm.common.doc_mtimes[prod][version]`에 주입.

